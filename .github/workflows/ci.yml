name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build + test + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test (builds first)
        run: npm test

      - name: Lint
        run: npm run lint

      # Dogfood: the analyzer must pass on its own repository with the
      # committed config + waivers. Exit 1 (findings) or 2 (can't
      # analyze) fails the job.
      - name: Self check
        run: node dist/server/index.js check .
